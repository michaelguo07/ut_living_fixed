name: Weekly Floor Plan Scraper

on:
  schedule:
    # Runs at 00:00 every Sunday (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allows manual trigger via the GitHub Actions UI tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Run scraper
        run: python scrape_all.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add master_floorplans.csv src/data/floorPlans.js
          # Only commit if there are actual diffs to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update floor plans data [skip ci]" && git push)
